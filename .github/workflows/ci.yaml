name: Machine Learning CI Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlflow-ci-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.11.3 dagshub==0.3.24 pandas scikit-learn matplotlib seaborn

    - name: Run MLflow Project Training
      env:
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        # Autentikasi otomatis menggunakan library resmi dagshub
        python -c "import dagshub; dagshub.auth.add_app_token('$DAGSHUB_TOKEN')"
        
        # Eksekusi training lokal tanpa memerlukan tracking URI cloud luar (menghindari 404)
        mlflow run -e modelling.py MLProject --env-manager local --experiment-name "Iris_Species_Classification" > run_output.txt
        cat run_output.txt
        RUN_ID=$(cat run_output.txt | grep -oE "run with ID '[a-z0-9]+'" | awk '{print $4}' | tr -d "'")
        echo "LATEST_RUN_ID=$RUN_ID" >> $GITHUB_ENV

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image via MLflow
      run: |
        # Membangun docker image dari run lokal yang baru saja selesai
        mlflow models build-docker -m "runs:/${{ env.LATEST_RUN_ID }}/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/iris-model:latest" --enable-mlserver

    - name: Push Docker Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/iris-model:latest