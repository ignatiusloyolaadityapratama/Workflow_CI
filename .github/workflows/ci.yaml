name: Machine Learning CI Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlflow-ci-pipeline:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/ignatiusloyolaadityapratama/Eksperimen_SML_Ignatius-loyola-aditya-pratama-siswa.mlflow

    steps:
    - name: Run actions/checkout@v3
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install mlflow==2.11.3 dagshub==0.3.24 pandas scikit-learn setuptools

    - name: Run mlflow project
      run: |
        PROJECT_DIR=$(find . -name "modelling.py" | xargs dirname)
        echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
        cd "$PROJECT_DIR"
        python modelling.py

    - name: Get latest MLflow run_id
      run: |
        RUN_ID=$(cat "${{ env.PROJECT_DIR }}/RUN_ID.txt")
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build Docker Model
      run: mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/iris-model:latest"

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/iris-model:latest