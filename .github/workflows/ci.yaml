name: Machine Learning CI Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlflow-ci-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install mlflow==2.11.3 dagshub==0.3.24 pandas scikit-learn

    - name: Run MLflow Project and Capture ID
      env:
        MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        MLFLOW_TRACKING_URI: https://dagshub.com/ignatiusloyolaadityapratama/Eksperimen_SML_Ignatius-loyola-aditya-pratama-siswa.mlflow
      run: |
        # Jalankan dan ambil ID dari output
        OUTPUT=$(mlflow run -e modelling.py MLProject --env-manager local --experiment-name "Iris_Species_Classification")
        echo "$OUTPUT"
        # Ekstrak ID (mencari pola run with ID '...')
        RUN_ID=$(echo "$OUTPUT" | grep -oE "run with ID '[a-z0-9]+'" | cut -d"'" -f2)
        echo "LATEST_RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Found Run ID: $RUN_ID"

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker
      env:
        MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        MLFLOW_TRACKING_URI: https://dagshub.com/ignatiusloyolaadityapratama/Eksperimen_SML_Ignatius-loyola-aditya-pratama-siswa.mlflow
      run: |
        # Cek apakah ID berhasil didapat
        if [ -z "${{ env.LATEST_RUN_ID }}" ]; then echo "Error: Run ID kosong!"; exit 1; fi
        
        # Build dengan URI yang benar
        mlflow models build-docker -m "runs:/${{ env.LATEST_RUN_ID }}/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/iris-model:latest" --enable-mlserver
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/iris-model:latest