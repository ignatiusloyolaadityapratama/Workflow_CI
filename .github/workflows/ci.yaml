name: Machine Learning CI Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlflow-ci-pipeline:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/ignatiusloyolaadityapratama/Eksperimen_SML_Ignatius-loyola-aditya-pratama-siswa.mlflow

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Train and Build
      run: |
        pip install mlflow==2.11.3 dagshub==0.3.24 pandas scikit-learn
        # Jalankan skrip training
        python modelling.py
        
        # Baca ID dari file yang dibuat skrip tadi
        RUN_ID=$(cat RUN_ID.txt)
        
        # Login Docker
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        
        # Build & Push
        mlflow models build-docker -m "runs:/$RUN_ID/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/iris-model:latest"
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/iris-model:latest